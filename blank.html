<head>
<meta charset="UTF-8">

<title>Moddle – Starting Download</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#080808;color:#efefef;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1.5rem;
  padding:2rem;overflow:hidden;position:relative;}
.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:600px;height:600px;pointer-events:none;
  background:radial-gradient(circle,rgba(34,197,94,.07) 0%,transparent 65%);}
.logo{width:80px;height:80px;object-fit:contain;
  filter:drop-shadow(0 0 20px rgba(34,197,94,.4));
  animation:float 2.5s ease-in-out infinite;}
.brand{font-size:1.4rem;font-weight:700;letter-spacing:-.03em;}
.brand span{color:#22c55e;}
.spinner{width:52px;height:52px;border-radius:50%;
  border:3px solid rgba(255,255,255,.08);
  border-top-color:#22c55e;
  animation:spin .75s linear infinite;}
.msg{font-size:.9rem;color:#666;letter-spacing:.01em;}
.dots{display:flex;gap:5px;}
.dot{width:6px;height:6px;border-radius:50%;background:#22c55e;
  animation:dotpop 1.3s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.15s;}
.dot:nth-child(3){animation-delay:.3s;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes dotpop{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
</style>
</head>
